# gaie values for inference-scheduling — minimal EPP
#
# R9 영속 fix — EPP v1.5.0 의 system defaults 가 core-metrics-extractor +
# lora_requests_info 강제 주입 → vLLM LoRA 비활성 시 backend unhealthy → "no
# valid backends". v1.4 image 로 downgrade + chart 의 default-plugins.yaml
# (v1.5 schema) 대신 custom-plugins.yaml (v1.4 호환) 으로 EPP args redirect.
#
# 두 단계 fix 가 모두 필요:
#   1) image tag v1.4.0 — v1.4 EPP 는 lora metric 못 찾아도 warning 만
#   2) pluginsConfigFile + pluginsCustomConfig — chart 가 emit 하는 default
#      plugins 에 v1.4 가 모르는 plugin type (core-metrics-extractor) 이 있어
#      EPP 시작 자체가 실패. 우리 custom-plugins.yaml 로 redirect 해 우회.
inferenceExtension:
  image:
    tag: v1.4.0
  pluginsConfigFile: custom-plugins.yaml
  pluginsCustomConfig:
    custom-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: queue-scorer
          weight: 2
        - pluginRef: kv-cache-utilization-scorer
          weight: 2
        - pluginRef: prefix-cache-scorer
          weight: 3

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/inferenceServing: "true"

epp:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "200m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
