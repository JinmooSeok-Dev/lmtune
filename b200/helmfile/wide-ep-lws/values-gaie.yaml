# gaie values for wide-EP — minimal EPP
#
# R9 영속 fix — image v1.4 + custom-plugins.yaml redirect (자세한 사유는
# inference-scheduling/values-gaie.yaml 헤더 코멘트 참조).
inferenceExtension:
  image:
    tag: v1.4.0
  pluginsConfigFile: custom-plugins.yaml
  pluginsCustomConfig:
    custom-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: queue-scorer
          weight: 2
        - pluginRef: kv-cache-utilization-scorer
          weight: 2
        - pluginRef: prefix-cache-scorer
          weight: 3

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/inferenceServing: "true"

epp:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "200m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
