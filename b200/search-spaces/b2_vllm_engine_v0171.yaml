apiVersion: lmtune/search/v1alpha1
kind: SearchSpace
name: b2-vllm-engine-v0171

# Phase B2 verified — vLLM 0.17.1 V1 engine 에 실재하는 CLI flag 만.
#
# 큰 b2_vllm_engine.yaml 은 vLLM 0.5~0.7 시기의 추정 axis 까지 포함해서
# 0.17.1 에선 unrecognized arguments 로 reject 됨. 본 파일은 0.17.1 V1
# (multi-step scheduler 제거, compilation_config JSON 통합 등) 기준 verified.
#
# 출처: vllm serve --help (0.17.1) + 공식 docs/release-notes 0.10~0.17.

axes:
  # ─────────── Scheduling / Batching ───────────
  max_num_seqs:
    type: categorical
    values: [32, 64, 128, 256, 512]

  max_num_batched_tokens:
    type: categorical
    values: [2048, 4096, 8192, 16384]

  # max_model_len 은 axis 에서 제거 — endpoint YAML 의 baseline (131072) 을 그대로
  # 사용. gpt-oss-120b native max = 131072. KV cache 압박은 max_num_seqs ×
  # max_num_batched_tokens 와 parallelism (별도 search-space) 으로 다룸.

  enable_chunked_prefill:
    type: bool

  # ─────────── KV Cache ───────────
  kv_cache_dtype:
    type: categorical
    values: [fp8, fp8_e4m3]
    # gpt-oss-120b 의 attention 커널이 hardcoded `assert kv_cache_dtype in
    # {"fp8", "fp8_e4m3"}` (vllm 0.17.1 model_executor/.../attention.py:408) →
    # auto / fp8_e5m2 선택 시 torch.compile 단에서 partial graph 컴파일 거부 crash.
    # 비-gpt-oss 모델 (Llama, Qwen 등) 으로 search 할 때는 별도 search-space 에서
    # auto / fp8_e5m2 활성 가능. nvfp4 는 모델·HW 호환성 사전 검증 후 별도 study.

  gpu_memory_utilization:
    type: float
    low: 0.80
    high: 0.92

  block_size:
    type: categorical
    values: [16, 32, 64, 128]

  swap_space:
    type: categorical
    values: [0, 4, 16]
    active_if: {enable_chunked_prefill: false}
    # vllm 0.17.1: --swap-space (GiB float). chunked-prefill 와 호환 X.

  cpu_offload_gb:
    type: categorical
    values: [0]
    # vllm 0.17.1 + V1 engine + multiproc_executor 조합에서 cpu_offload_gb > 0 이면
    # `Cannot re-initialize the input batch when CPU weight offloading is enabled`
    # crash (vllm-project/vllm#18298). PR 머지 전까지 freeze. B200 ~3 TB HBM3e
    # 환경에선 단일 노드 모델 (gpt-oss-120b 등) weight offload 불필요 — 의미 손실 X.
    # 멀티노드/대형 MoE 에서 필요 시 별도 search-space 에서 vllm patch 버전 사용.

  # ─────────── Prefix Cache ───────────
  enable_prefix_caching:
    type: bool

  prefix_caching_hash_algo:
    type: categorical
    values: [builtin, sha256]
    active_if: {enable_prefix_caching: true}

  # ─────────── dtype / Quantization ───────────
  dtype:
    type: categorical
    values: [auto, bfloat16]
    # MXFP4 native 모델 (gpt-oss-*, K2 일부 quant) 은 float16 미지원 →
    # vllm 의 pydantic VllmConfig validation 단에서 reject. bf16/auto 만 안전.
    # 비-MXFP4 모델 (DSV3, Qwen, Llama dense) 에선 추후 별도 search-space 에서
    # float16 활성화 가능.

  # ─────────── Compute ───────────
  # enforce_eager 는 axis 에서 제거 — gpt-oss-120b 같은 큰 모델은 CUDA graph 가
  # 거의 모든 axis 조합에서 우위. eager 는 디버그·startup 시간 감소 외 의미 X.
  # 필요 시 endpoint YAML 의 engine_args 에 fixed=false (default) 그대로.
