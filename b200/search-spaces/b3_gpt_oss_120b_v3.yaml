apiVersion: lmtune/search/v1alpha1
kind: SearchSpace
name: b3-gpt-oss-120b-v3

# B3 v3 — gpt-oss-120b 16-GPU inference-scheduling autotune (PP/PCP/DCP 추가).
#
# 본 파일 = b3_gpt_oss_120b_v2.yaml (13 axis) + simulator.ts 의 vllm-config-puzzle
# 1:1 port 를 따라 추가 (R25, R26 후, PP 1개만 살아남음):
#   - pipeline_parallel_size (vllm 0.17.1 arg_utils.py:400, mp executor + GptOss
#     SupportsPP 명시 source-verified)
#
# PCP (prefill_context_parallel_size) 는 R25 로 제거. vllm 0.17.1 backend 들
# 어느 것도 supports_pcp=True 가 아님 → cp_utils.py:38 assert crash.
#
# DCP (decode_context_parallel_size) 는 R26 으로 제거. gpt-oss-120b 는 GQA
# (num_kv_heads=8). vllm/config/model.py:1072 가 GQA + DCP>1 시 tp > 8 강제.
# inference-scheduling chart multinode false 라 single-pod max tp=8 →
# tp > 8 불가능. multinode chart 도입 후 재고려.
#
# Sequence Parallel: vllm 0.17.1 에 별도 CLI flag 없음. compilation_config 의
# pass_config 로만 활성. TP>1 + eligible model 시 vllm 자체 auto-enable
# (vllm_config.py:863). 명시 axis 미도입 — TP>1 axis sample 시 자동 효과.
#
# 본 path = inference-scheduling (multinode: false). single pod 안에서 vllm 의
# mp executor 가 모든 rank spawn. world_size = TP × PP × PCP (DCP 는 TP group
# 안에서 KV 분산이라 추가 GPU 안 씀, parallel.py:649 1:1 port).
# 따라서 single-pod 제약 = TP × PP × PCP <= 8 (B200 노드 1대 8 GPU).
#
# 본 PR 의 비-목표 (별도 PR):
#   - SP — vllm compilation_config JSON axis 표현 검증 후
#   - wide-EP / DBO / EPLB — R19 (DeepEP NotImplementedError) 회피
#
# 사용:
#   lmtune search start \
#     --space b200/search-spaces/b3_gpt_oss_120b_v3.yaml \
#     --endpoint b200/endpoints/b200_gpt-oss-120b.yaml \
#     --adapter llmd-k8s --cluster-env b200-dual-node \
#     --strategy tpe --max-trials 30 --seed 17 \
#     --warmstart-db data/db/lmtune.duckdb --warmstart-top-k 8 \
#     --name b3-gpt-oss-120b-v3 \
#     --repeats 3 --ttft-slo-ms 2000 \
#     -p configs/profiles/autotune/short.yaml

axes:
  # ─── Parallelism (b3-v2 + PP/PCP/DCP 추가) ───
  tp:
    type: categorical
    values: [2, 4, 8]

  pp:
    type: categorical
    values: [1, 2]
    # vllm 0.17.1 mp executor 로 single-pod intra-node PP. multinode chart 가
    # 아니어서 cross-node PP 불가. tp × pp <= 8 단일 노드 제약.

  # PCP (prefill_context_parallel_size) 는 R25 로 제거.
  # vllm 0.17.1 의 backend.py:647 의 `supports_pcp` 가 base class False, 어느
  # subclass 도 True override 안 함 → cp_utils.py:38 의 `assert
  # layer_impl.supports_pcp` 가 PCP>1 모든 backend 에서 startup crash.
  # vllm 차후 release 에서 backend 가 True override 시 재추가.

  # DCP (decode_context_parallel_size) 는 R26 으로 gpt-oss-120b 에서 제거.
  # vllm/config/model.py:1072 가 GQA/MQA (non-MLA) 모델에서 DCP > 1 시:
  #   tp > total_num_kv_heads (STRICT, model.py:1073 assert)
  # 를 강제. gpt-oss-120b 는 GQA + num_kv_heads=8. inference-scheduling chart
  # 는 multinode false 라 single-pod max tp=8 → tp > 8 불가능 → DCP > 1
  # 모든 trial 이 startup assert crash.
  # multinode chart (pd-disaggregation 등) 도입 + tp=16 가능해진 후 재추가.
  # vllm-config-puzzle validation.ts 는 본 제약 미반영 — simulator 가 vllm
  # 0.17.1 까지 follow up 못 한 영역.

  dp:
    type: categorical
    values: [1, 2]
    # inference-scheduling: dp = independent replica count (R18 default).
    # b3_v2 의 [1,2,4,8] 에서 [1,2] 로 축소 — pp/pcp 와 곱하면 노드 수 부족.

  ep:
    type: bool
    # MoE 모델 (gpt-oss-120b) 의 ep toggle. wide-EP path 와 별개로 안전.

  # ─── Scheduling / Batching (b3-v2 와 동일) ───
  max_num_seqs:
    type: categorical
    values: [32, 64, 128, 256, 512]

  max_num_batched_tokens:
    type: categorical
    values: [2048, 4096, 8192, 16384]

  max_model_len:
    type: categorical
    values: [131072]
    # 사용자 지시로 131072 고정 (gpt-oss-120b native 최대). axis 가 단일 값이라
    # sample 도 단일 — 통계적 영향 분석 시 자동 freeze. b3_v2/v4 의 [65536,131072]
    # study 결과는 archive 에 보존 (warmstart-db 가 학습 활용).

  async_scheduling:
    type: bool

  # ─── KV / Compute (b3-v2 와 동일) ───
  enable_prefix_caching:
    type: bool

  enable_chunked_prefill:
    type: bool

  prefix_caching_hash_algo:
    type: categorical
    values: [builtin, sha256]
    active_if: {enable_prefix_caching: true}

  gpu_memory_utilization:
    type: float
    low: 0.80
    high: 0.92

  block_size:
    type: categorical
    values: [16, 32, 64]


# ─── Feasibility constraints ───
feasibility_constraints:
  - id: c1_npu_count
    rule: "tp * pp * dp <= environment.total_npus"
    message: "tp × pp × dp must fit total NPUs (16 on B200 dual-node)"

  - id: c2_intra_pod_size
    rule: "tp * pp <= environment.npus_per_server"
    message: "TP × PP 가 single pod 8 GPU 안에 fit (multinode: false)"

  - id: c3_pp_layers
    rule: "pp <= model.num_layers"
    message: "PP stages cannot exceed model layers (gpt-oss-120b: 36)"

  - id: c4_heads_div_tp
    rule: "model.num_attention_heads % tp == 0"
    message: "TP must divide attention heads (gpt-oss-120b: 64 heads)"

  # c5_dcp_div_tp 는 R26 으로 제거 (DCP axis 제거됨). 향후 multinode chart 와
  # 함께 DCP 재도입 시 다음 룰들도 함께 등록 (vllm/config/model.py:1072 1:1):
  #   - (model.use_mla == True) OR (tp > model.num_kv_heads)
  #   - decode_context_parallel_size <= tp / model.num_kv_heads
  #   - (model.num_attention_heads / model.num_kv_heads) % dcp == 0

  - id: c6_gpu_memory
    rule: "surrogate.simulated_total_gb <= environment.gpu_vram_gb * gpu_memory_utilization"
    message: "Active params + KV must fit in GPU HBM (B200: 192 GB)"

  - id: c11_inference_scheduling_pp
    rule: "tp * pp <= 8"
    message: "inference-scheduling chart multinode false — single pod 8 GPU 한정"

  - id: c12_pp_ep_mxfp4_incompat
    rule: "(pp == 1) OR (NOT ep)"
    message: "R28: vllm 0.17.1 의 gpt-oss-120b MXFP4 weight loader 가 PP+EP 조합 미지원
      (gpt_oss.py:498 의 weight broadcasting 0-size). PP 또는 EP 단독은 OK"
