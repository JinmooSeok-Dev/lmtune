apiVersion: lmtune/v1alpha1
slug: b200-gpt-oss-120b
name: "B200 single-GPU — gpt-oss-120b (MoE, MXFP4)"
url: http://127.0.0.1:8011/v1
model: openai/gpt-oss-120b
tokenizer: openai/gpt-oss-120b
api_type: openai

deployment:
  engine: vllm
  version: "0.17.1"
  # parallelism 은 chart values (decode.parallelism.tensor=8 + decode.replicas=2)
  # 가 단일 source. endpoint 에 또 두면 adapter 가 vllmArgs 로 inject → 중복.
  # 16-GPU 토폴로지 (TP=8 × DP=2) 는 values-gpt-oss-120b.yaml.gotmpl 참조.
  engine_args:
    enable_prefix_caching: true
    max_num_seqs: 128
    max_model_len: 8192
    gpu_memory_utilization: 0.90
    kv_cache_dtype: auto
    dtype: bfloat16
    # tensor_parallel_size 는 deployment.parallelism.tp 또는 chart 의
    # decode.parallelism.tensor 에서만 설정. engine_args 에서 또 주면 중복 emit.
  helmfile_overrides:
    helmfile_file: b200/helmfile/inference-scheduling/helmfile.yaml.gotmpl
    environment: default
    selector: kind=inference-stack
    release_name: ms-infsch
    namespace: b200-infsch
    deployment_name: ms-infsch-llm-d-modelservice-decode
    rollout_timeout_s: 1500   # 117B MXFP4 weight 다운로드/로딩 길어질 수 있음

notes: |
  gpt-oss-120b — 117B MoE / 5.1B active / 128 experts top-4 / MXFP4.
  default = TP=8 × DP=2 = 16 GPU 전부 활용 (노드별 1 replica, NVLink/NVSwitch).
  P/D disaggregation 비활성 (NIXL 미정상). prefill.create: false 명시.
  TopologySpreadConstraint 로 노드별 1 replica 강제 (cross-node RDMA 회피).

  16-GPU axis sweep (b3_parallelism.yaml):
    - TP=2 × DP=8, TP=4 × DP=4 (replicas 우위)
    - wide-EP (DP=8 × EP=8) — wide-ep-lws path 별도

  helmfile redeploy 전:
    export B200_MODEL_VALUES=values-gpt-oss-120b.yaml.gotmpl

tags: [b200, gpt-oss, moe, mxfp4, large, 16gpu]
