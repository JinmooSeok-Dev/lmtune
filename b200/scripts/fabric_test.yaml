# fabric_test.yaml — B200 두 노드 간 NCCL all-reduce + iperf3 측정용 K8s manifest
#
# 사용:
#   kubectl apply -f b200/scripts/fabric_test.yaml
#   kubectl logs job/nccl-test-allreduce
#   kubectl logs job/iperf3-server      # 한 쪽
#   kubectl logs job/iperf3-client      # 다른 쪽
#
# 정리:
#   kubectl delete -f b200/scripts/fabric_test.yaml
#
# 환경 가정:
#   - nvidia-device-plugin 으로 nvidia.com/gpu 자원 노출
#   - 두 노드 모두 GPU ≥ 1
#   - RDMA 사용 시 hostNetwork 권장 (또는 Multus 로 IB NetworkAttachmentDefinition)

---
apiVersion: v1
kind: Namespace
metadata:
  name: bench-fabric-test

---
# ---- NCCL all-reduce: 2-rank, GPU 0 on each of 2 nodes -----------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: nccl-test-allreduce
  namespace: bench-fabric-test
spec:
  completions: 2
  parallelism: 2
  completionMode: Indexed
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: nccl-test
    spec:
      restartPolicy: Never
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nccl-test
      containers:
        - name: nccl-test
          image: nvcr.io/nvidia/pytorch:24.10-py3
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              echo "JOB_COMPLETION_INDEX=$JOB_COMPLETION_INDEX on $(hostname)"
              cd /tmp
              if [ ! -d nccl-tests ]; then
                git clone --depth 1 https://github.com/NVIDIA/nccl-tests.git
                cd nccl-tests && make MPI=0 -j4
              else
                cd nccl-tests
              fi
              # Master is index 0; both ranks rendezvous via shared headless service
              if [ "${JOB_COMPLETION_INDEX:-0}" = "0" ]; then
                MASTER_ADDR=$(hostname -I | awk '{print $1}')
              else
                MASTER_ADDR=${MASTER_ADDR:-127.0.0.1}
              fi
              echo "Will run all_reduce_perf with NCCL_DEBUG=INFO"
              NCCL_DEBUG=INFO build/all_reduce_perf -b 8M -e 1G -f 2 -g 1 || true
          env:
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_NET_GDR_LEVEL
              value: "5"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
          resources:
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 8Gi
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: 16Gi
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]

---
# ---- iperf3 server -----------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: iperf3-server
  namespace: bench-fabric-test
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: iperf3
        role: server
    spec:
      restartPolicy: Never
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: Exists
      containers:
        - name: iperf3
          image: networkstatic/iperf3:latest
          args: ["-s", "-1", "-p", "5201"]
          ports:
            - containerPort: 5201

---
# ---- iperf3 client (must run on the other node) ------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: iperf3-client
  namespace: bench-fabric-test
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: iperf3
        role: client
    spec:
      restartPolicy: Never
      hostNetwork: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: iperf3
      containers:
        - name: iperf3
          image: networkstatic/iperf3:latest
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              # 서버 IP 는 hostNetwork 라 노드 IP. 환경변수 IPERF_SERVER 로 주입 가능.
              SERVER=${IPERF_SERVER:-}
              if [ -z "$SERVER" ]; then
                echo "set IPERF_SERVER=<other node IP> via kubectl set env"
                sleep 5
                exit 1
              fi
              iperf3 -c "$SERVER" -p 5201 -t 30 -P 4 -J
          env:
            - name: IPERF_SERVER
              value: ""    # kubectl set env -n bench-fabric-test job/iperf3-client IPERF_SERVER=<ip>
