name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install ruff
        run: pip install "ruff>=0.5.0"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install
        run: |
          pip install -e ".[dev,search,distributed]"
      - name: pytest
        run: pytest -q --maxfail=5 --cov --cov-report=term --cov-report=xml
      - name: upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          additional_files: |
            autoresearch.sh
            b200/scripts/probe.sh
        env:
          SHELLCHECK_OPTS: "-e SC2086 -e SC2155"
