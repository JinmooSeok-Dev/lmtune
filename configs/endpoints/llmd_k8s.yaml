apiVersion: bench/v1alpha1
slug: llmd-k8s
name: "llm-d on K8s (A5000 Int4 샘플 구성)"
# 실제 배포 주소로 변경하세요. 현재 값은 참고용 예시입니다.
url: http://llm-d.e2e.sw2.rebellions.in/v1
model: Qwen/Qwen2.5-Coder-14B-Instruct-GPTQ-Int4
tokenizer: Qwen/Qwen2.5-Coder-14B-Instruct-GPTQ-Int4
api_type: openai
# api_key_env: LLMD_API_KEY

# 구성 식별축. 같은 URL 에 TP/DP/EP·engine_args 만 다른 실험을 구별하여
# runs 테이블에 메타로 저장. 자동화 로직은 이 필드를 읽지 않음.
deployment:
  engine: vllm
  version: "0.14.0"
  parallelism:
    tp: 4
    dp: 1
    ep: true
  engine_args:
    enable_prefix_caching: true
    max_num_seqs: 4
    max_model_len: 65536
    block_size: 16

notes: "vLLM 0.14 on llm-d. 구성 변경 시 deployment 블록만 수정해 신규 실험으로 태깅."
tags: [sample, llmd, openai-compatible]
