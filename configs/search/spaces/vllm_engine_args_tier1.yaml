apiVersion: bench/search/v1alpha1
kind: SearchSpace
name: vllm-engine-args-tier1

# Phase S1 첫 탐색 공간. RTX 5060 Ti 16GB 단일 GPU + vLLM.
# tp/pp/dp/ep 는 active_if 로 K8s adapter 전용; S4 에서 해금.
# float 축은 grid 에서 지원 불가 — random 또는 lhc 사용.

axes:
  max_num_seqs:
    type: categorical
    values: [16, 32, 64, 128, 256]

  enable_prefix_caching:
    type: bool

  enable_chunked_prefill:
    type: bool

  gpu_memory_utilization:
    type: float
    low: 0.80
    high: 0.92

  max_model_len:
    type: categorical
    values: [2048, 4096, 8192]

  kv_cache_dtype:
    type: categorical
    values: [auto, fp8]   # S4 첫 apply 에서 Blackwell probe, 실패 시 ANOVA freeze

  # --- llm-d K8s 전용 (S4) ---
  tp:
    type: int
    low: 1
    high: 8
    step: 1
    active_if: {adapter: llmd-k8s}

  pp:
    type: int
    low: 1
    high: 2
    step: 1
    active_if: {adapter: llmd-k8s}

  dp:
    type: int
    low: 1
    high: 4
    step: 1
    active_if: {adapter: llmd-k8s}
