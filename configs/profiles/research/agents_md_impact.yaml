apiVersion: lmtune/v1alpha1
slug: research-agents-md-impact
name: "AGENTS.md 영향 (runtime 28.64%↓, output tokens 16.58%↓)"
stage: 3
description: |
  "On the Impact of AGENTS.md Files on Efficiency of AI Coding Agents"
  (arXiv:2601.20404, v2 2026.03.30) — AGENTS.md 존재 시 runtime 28.64%↓.
  본 preset 은 동일 profile 을 agents_md 블록을 `shared_system_prompt_length`
  로 주입/미주입 두 endpoint 에 대해 `lmtune nway` 로 비교할 수 있도록 구조화.
references: []

runner: aiperf
mode: user_centric

workload:
  source: synthetic
  synthetic_input_tokens_mean: 1200
  output_tokens_mean: 300
  shared_system_prompt_length: 2000   # AGENTS.md 길이 시뮬레이션. 비교 시 다른 profile 에서 0.
  conversation_num: 5
  conversation_turn_mean: 10
  num_users: 1
  user_centric_rate: 2.0

analysis:
  group_by: [turn_idx]
  metrics: [ttft, e2e, output_tokens]
  plots:
    - kind: ttft_vs_turn
    - kind: histogram
      metric: output_tokens
  sinks: [markdown, csv]

tags: [research, agents-md, agent-loop]
