apiVersion: lmtune/v1alpha1
slug: autotune-long
name: "Autotune — long (4096/512, 긴 컨텍스트)"
stage: 1
description: "긴 입력. KV cache 압박이 큼. prefix_caching/chunked_prefill 효과 뚜렷."
references: []

runner: guidellm
mode: concurrency

workload:
  source: synthetic
  synthetic_input_tokens_mean: 3072
