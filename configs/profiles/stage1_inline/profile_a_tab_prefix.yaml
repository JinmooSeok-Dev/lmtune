slug: profile-a-tab-prefix
name: "Profile A — Tab Completion (Prefix Caching ON)"
stage: 1
description: |
  Profile A 와 동일하지만 같은 prefix(1500 tok)를 공유하여 prefix-caching 효과를
  정량화. profile-a-tab 대비 TTFT 절감률을 보고.
references: [S-7, S-19]

runner: aiperf
mode: concurrency

workload:
  synthetic_input_tokens_mean: 2000
  output_tokens_mean: 50
  random_prefix_len: 1500
  shared_system_prompt_length: 0
  concurrency: 4
  request_count: 200
  random_seed: 42

slo:
  ttft_p99_ms: 2000

tags: [stage1, tab-completion, prefix-cache]
