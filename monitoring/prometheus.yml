global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vllm'
    metrics_path: /metrics
    static_configs:
      - targets:
          # endpoint 의 metrics 주소 (host 기준). K8s 환경이면 Ingress/Service 주소로 변경.
          - 'host.docker.internal:8000'
        labels:
          endpoint_slug: 'local-vllm'

  # 추가 endpoint 는 target + endpoint_slug label 을 늘려 등록.
  # - job_name: 'vllm-llmd'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['llm-d.example.internal:8000']
  #       labels:
  #         endpoint_slug: 'llmd-k8s'
